name: Publish Package Repos

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y createrepo-c dpkg-dev

      - name: Download packages from releases
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p build/rpm build/deb site/repos/rpm site/repos/deb

          gh release list --repo "$REPO" --limit 10 \
            --json tagName -q '.[].tagName' | while read -r tag; do
            gh release download "$tag" --repo "$REPO" \
              --pattern '*.rpm' --skip-existing --dir build/rpm || true
            gh release download "$tag" --repo "$REPO" \
              --pattern '*.deb' --skip-existing --dir build/deb || true
          done

          echo "=== RPMs ==="
          ls -la build/rpm/ || echo "(none)"
          echo "=== DEBs ==="
          ls -la build/deb/ || echo "(none)"

      - name: Build RPM repo metadata (metadata only)
        env:
          REPO: ${{ github.repository }}
        run: |
          # Generate metadata from local RPMs
          createrepo_c build/rpm/

          # Rewrite package locations to point at GitHub Releases
          for xml_gz in build/rpm/repodata/*-primary.xml.gz; do
            gunzip "$xml_gz"
            xml="${xml_gz%.gz}"
            # e.g. packages/Handy-0.8.0-1.x86_64.rpm -> full GitHub Releases URL
            for rpm_file in build/rpm/*.rpm; do
              filename=$(basename "$rpm_file")
              # Extract version from filename: Handy-0.8.0-1.x86_64.rpm -> 0.8.0
              version=$(echo "$filename" | sed -n 's/.*-\([0-9][0-9.]*\)-.*/\1/p')
              release_url="https://github.com/${REPO}/releases/download/v${version}/${filename}"
              sed -i "s|<location href=\"${filename}\"/>|<location href=\"${release_url}\"/>|" "$xml"
            done
            gzip "$xml"
          done

          # Copy only metadata to site (no packages)
          cp -r build/rpm/repodata site/repos/rpm/

      - name: Build DEB repo metadata (metadata only)
        env:
          REPO: ${{ github.repository }}
        run: |
          cd build/deb
          dpkg-scanpackages --multiversion . > Packages

          # Rewrite Filename paths to GitHub Releases URLs
          while IFS= read -r line; do
            if [[ "$line" =~ ^Filename:\ ./(.+) ]]; then
              filename="${BASH_REMATCH[1]}"
              version=$(echo "$filename" | sed -n 's/.*_\([0-9][0-9.]*\)_.*/\1/p')
              echo "Filename: https://github.com/${REPO}/releases/download/v${version}/${filename}"
            else
              echo "$line"
            fi
          done < Packages > Packages.tmp
          mv Packages.tmp Packages

          gzip -k Packages
          cd -

          cp build/deb/Packages build/deb/Packages.gz site/repos/deb/

      - name: Write repo config files
        run: |
          PAGES_URL="${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          cat > site/repos/rpm/handy.repo <<-REPOEOF
          [handy]
          name=Handy - Offline Speech-to-Text
          baseurl=https://${PAGES_URL}/repos/rpm/
          enabled=1
          gpgcheck=0
          REPOEOF
          sed -i 's/^[[:space:]]*//' site/repos/rpm/handy.repo

          cat > site/repos/deb/handy.list <<-DEBEOF
          deb [trusted=yes] https://${PAGES_URL}/repos/deb /
          DEBEOF
          sed -i 's/^[[:space:]]*//' site/repos/deb/handy.list

      - name: Write landing page
        run: |
          PAGES_URL="${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          cat > site/repos/index.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head><title>Handy Package Repos</title>
          <style>body{font-family:system-ui;max-width:720px;margin:2em auto;padding:0 1em}pre{background:#f4f4f4;padding:1em;overflow-x:auto;border-radius:4px}h2{margin-top:2em}</style>
          </head>
          <body>
          <h1>Handy Package Repositories</h1>
          <p>Auto-updated from <a href="https://github.com/${{ github.repository }}/releases">GitHub Releases</a>.</p>

          <h2>Fedora</h2>
          <pre>sudo dnf config-manager addrepo --from-repofile=https://${PAGES_URL}/repos/rpm/handy.repo
          sudo dnf install handy</pre>

          <h2>Fedora Atomic (Silverblue, Kinoite, uCore, etc.)</h2>
          <pre>sudo curl -o /etc/yum.repos.d/handy.repo https://${PAGES_URL}/repos/rpm/handy.repo
          rpm-ostree install handy</pre>
          <p>See <a href="https://docs.fedoraproject.org/en-US/iot/add-repos/">Fedora docs: Configuring Package Repositories</a> for more on adding repos to atomic/immutable desktops.</p>

          <h2>Ubuntu / Debian</h2>
          <pre>sudo curl -o /etc/apt/sources.list.d/handy.list https://${PAGES_URL}/repos/deb/handy.list
          sudo apt update &amp;&amp; sudo apt install handy</pre>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build-repos
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}repos/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
